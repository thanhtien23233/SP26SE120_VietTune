# Phase 3 — PLAN-e2e-contributor-workflow: smoke E2E không cần tài khoản contributor.
# Báo cáo: playwright-report/ + test-results/junit.xml (artifacts).

name: E2E

on:
  push:
    branches: [main, master, develop, FE-API]
  pull_request:
    branches: [main, master, develop, FE-API]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run E2E smoke (CI projects)
        run: npm run test:e2e:ci
        env:
          CI: true

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload JUnit
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-junit
          path: test-results/junit.xml
          retention-days: 14
          if-no-files-found: ignore

