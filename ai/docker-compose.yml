# ============================================================
# VietTune AI Services — Docker Compose (All-in-One)
# ============================================================
# Chạy: docker compose up -d
# Dừng: docker compose down
# Xem logs: docker compose logs -f
# ============================================================

version: '3.8'

services:
  # ──────────────────────────────────────────────
  # 1. Embedding / Instrument Detection Service
  # Port: 8000
  # ──────────────────────────────────────────────
  embedding-service:
    build: ./viettune-embedding-service
    image: viettune-embedding:latest
    container_name: viettune-embedding
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ──────────────────────────────────────────────
  # 2. RAG / LLM Service
  # Port: 8001
  # Yêu cầu: Ollama phải đang chạy trên host
  # ──────────────────────────────────────────────
  rag-service:
    build: ./viettune-rag-service
    image: viettune-rag:latest
    container_name: viettune-rag
    ports:
      - "8001:8001"
    environment:
      - OLLAMA_URL=http://host.docker.internal:11434
      - LLM_MODEL=gemma3:4b
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ──────────────────────────────────────────────
  # 3. Whisper Transcription Service
  # Port: 8002
  # Lưu ý: Chạy LOCAL được khuyến nghị hơn Docker
  #         vì cần GPU acceleration (CUDA)
  # ──────────────────────────────────────────────
  whisper-service:
    build: ./viettune-whisper-service
    image: viettune-whisper:latest
    container_name: viettune-whisper
    ports:
      - "8002:8002"
    env_file:
      - ./viettune-whisper-service/.env
    restart: unless-stopped
    # Uncomment nếu có NVIDIA GPU + nvidia-docker:
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
